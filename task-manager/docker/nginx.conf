# Config complète pour Alpine : nginx en USER nginx (pas de master root).
# Les paquets Alpine compilent souvent des chemins par défaut sous /var/lib/nginx/ (root only) :
# on force logs + répertoires temporaires vers /tmp.
error_log /dev/stderr notice;
pid /tmp/nginx.pid;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    # Évite mkdir() sous /var/lib/nginx/tmp (Permission denied en non-root)
    client_body_temp_path /tmp/nginx-client-body 1 2;
    proxy_temp_path /tmp/nginx-proxy 1 2;
    fastcgi_temp_path /tmp/nginx-fastcgi 1 2;
    uwsgi_temp_path /tmp/nginx-uwsgi 1 2;
    scgi_temp_path /tmp/nginx-scgi 1 2;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
