apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: redis-appsofapps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: data
          emptyDir: {}
