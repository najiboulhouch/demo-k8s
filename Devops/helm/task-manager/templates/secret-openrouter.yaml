{{- if and .Values.openrouter.createSecret .Values.openrouter.apiKey (not .Values.openrouter.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ printf "%s-openrouter" (include "task-manager.fullname" .) }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENROUTER_API_KEY: {{ .Values.openrouter.apiKey | quote }}
{{- end }}
