apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ include "task-manager.api.fullname" . }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "task-manager.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "task-manager.api.podLabels" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: CORS_ORIGIN
              value: {{ .Values.api.corsOrigin | quote }}
            {{- if or .Values.openrouter.existingSecret (and .Values.openrouter.createSecret .Values.openrouter.apiKey) }}
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "task-manager.openrouterSecretName" . }}
                  key: {{ .Values.openrouter.secretKey | default "OPENROUTER_API_KEY" }}
                  {{- if and .Values.openrouter.createSecret .Values.openrouter.apiKey }}
                  optional: false
                  {{- else }}
                  optional: true
                  {{- end }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
