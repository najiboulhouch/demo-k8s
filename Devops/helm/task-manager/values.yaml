api:
  replicaCount: 1
  image:
    repository: task-manager-api
    tag: v1
    pullPolicy: IfNotPresent
  corsOrigin: "http://task-manager.local,http://localhost:8888"
  port: 3000
  dbPath: "/data/db.json"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
  podSecurityContext:
    fsGroup: 10001
    fsGroupChangePolicy: OnRootMismatch
  seedDb:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    capabilities:
      drop:
        - ALL

web:
  replicaCount: 1
  image:
    repository: task-manager-web
    tag: v1
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    capabilities:
      drop:
        - ALL
  podSecurityContext:
    fsGroup: 10001
    fsGroupChangePolicy: OnRootMismatch

ingress:
  enabled: true
  className: nginx
  hosts:
    - task-manager.local
    - localhost

# Clé OpenRouter pour l'API
# - secretKey : nom de la clé *dans* le Secret Kubernetes (pas la valeur de la clé API).
# - createSecret + apiKey : le chart crée un Secret (préférez --set pour apiKey).
openrouter:
  existingSecret: ""
  secretKey: "OPENROUTER_API_KEY"
  createSecret: false
  apiKey: ""

nameOverride: ""
fullnameOverride: ""
