# Éviter le namespace « default » (Kubescape DevOpsBest) :
#   helm upgrade --install task-manager . --namespace task-manager --create-namespace
#
api:
  replicaCount: 1
  image:
    repository: task-manager-api
    tag: v1
    pullPolicy: IfNotPresent
  corsOrigin: "http://task-manager.local,http://localhost:8888"
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000

web:
  replicaCount: 1
  image:
    repository: task-manager-web
    tag: v1
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101

ingress:
  enabled: true
  className: nginx
  hosts:
    - task-manager.local
    - localhost

# Clé OpenRouter pour l'API
# - secretKey : nom de la clé *dans* le Secret Kubernetes (pas la valeur de la clé API).
# - createSecret + apiKey : le chart crée un Secret (préférez --set pour apiKey).
openrouter:
  existingSecret: ""
  secretKey: "OPENROUTER_API_KEY"
  createSecret: false
  apiKey: ""

nameOverride: ""
fullnameOverride: ""
