apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-api
  labels:
    app.kubernetes.io/name: task-manager-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: task-manager-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: task-manager-api
    spec:
      containers:
        - name: api
          image: task-manager-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            # Même host que l’Ingress (voir ingress.yaml). Ajustez si vous changez le host.
            - name: CORS_ORIGIN
              value: "http://task-manager.local,http://localhost:8888"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
      # Pas de volume sur /app/data : un emptyDir masquait le db.json de l’image → base vide → 404 sur /api/tasks.
      # Persistance : remplacer par un PVC + initContainer (copie du seed) ou Job de migration.
